<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" font-family="system-ui, sans-serif">
  <rect width="900" height="560" fill="#f1f5f9"/>
  <rect width="900" height="52" fill="#ffffff"/>
  <rect x="0" y="51" width="900" height="1" fill="#e2e8f0"/>
  <circle cx="26" cy="26" r="5" fill="#22c55e"/>
  <text x="40" y="32" font-size="14" font-weight="800" fill="#1e293b" letter-spacing="1">CIPP/US PREP</text>
  <rect x="826" y="15" width="56" height="22" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
  <text x="854" y="30" font-size="10" fill="#94a3b8" text-anchor="middle">back</text>

  <!-- Topic header -->
  <text x="24" y="80" font-size="9" fill="#7c4ff7" letter-spacing="2">DOMAIN 2 · STUDY MODE</text>
  <text x="24" y="104" font-size="20" font-weight="800" fill="#1e293b">HIPAA: Covered Entities and PHI</text>
  <rect x="726" y="74" width="150" height="30" rx="8" fill="#dcfce7" stroke="#22c55e"/>
  <text x="801" y="94" font-size="12" font-weight="700" fill="#15803d" text-anchor="middle">⚡ Quiz this topic</text>

  <!-- Content card -->
  <rect x="24" y="118" width="852" height="418" rx="10" fill="#ffffff" stroke="#e2e8f0"/>

  <!-- Charts label -->
  <text x="44" y="144" font-size="9" fill="#94a3b8" letter-spacing="2">KEY CONCEPTS AT A GLANCE</text>

  <!-- Chart 1: HIPAA Covered Entity Types -->
  <rect x="44" y="154" width="384" height="170" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="62" y="174" font-size="12" font-weight="700" fill="#1e293b">HIPAA Civil Penalty Tiers</text>
  <text x="62" y="188" font-size="10" fill="#64748b">Per-violation fines by knowledge level</text>
  <rect x="72"  y="280" width="44" height="24" rx="3" fill="#22c55e" opacity="0.85"/>
  <text x="94"  y="276" font-size="9" fill="#475569" text-anchor="middle">$100</text>
  <text x="94"  y="318" font-size="9" fill="#64748b" text-anchor="middle">Unaware</text>
  <rect x="138" y="252" width="44" height="52" rx="3" fill="#4f8ef7" opacity="0.85"/>
  <text x="160" y="248" font-size="9" fill="#475569" text-anchor="middle">$1k</text>
  <text x="160" y="318" font-size="9" fill="#64748b" text-anchor="middle">Reasonable</text>
  <rect x="204" y="228" width="44" height="76" rx="3" fill="#a78bfa" opacity="0.85"/>
  <text x="226" y="224" font-size="9" fill="#475569" text-anchor="middle">$10k</text>
  <text x="226" y="318" font-size="9" fill="#64748b" text-anchor="middle">Willful</text>
  <rect x="270" y="200" width="44" height="104" rx="3" fill="#f59e0b" opacity="0.85"/>
  <text x="292" y="196" font-size="9" fill="#475569" text-anchor="middle">$50k</text>
  <text x="292" y="318" font-size="9" fill="#64748b" text-anchor="middle">Uncorrected</text>
  <text x="342" y="240" font-size="9" fill="#64748b">max</text>
  <text x="336" y="252" font-size="9" fill="#f59e0b">$1.9M</text>
  <text x="336" y="262" font-size="8" fill="#94a3b8">per category</text>

  <!-- Chart 2: PHI categories horizontal -->
  <rect x="444" y="154" width="388" height="170" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="464" y="174" font-size="12" font-weight="700" fill="#1e293b">HIPAA Covered Entity Types</text>
  <text x="464" y="188" font-size="10" fill="#64748b">Who must comply with the Privacy Rule</text>
  <text x="464" y="215" font-size="10" fill="#334155" font-weight="500">Health Plans</text>
  <rect x="570" y="205" width="236" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="570" y="205" width="236" height="10" rx="4" fill="#22c55e" opacity="0.85"/>
  <text x="464" y="240" font-size="10" fill="#334155" font-weight="500">Healthcare Providers</text>
  <rect x="570" y="230" width="236" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="570" y="230" width="200" height="10" rx="4" fill="#4f8ef7" opacity="0.85"/>
  <text x="464" y="265" font-size="10" fill="#334155" font-weight="500">Clearinghouses</text>
  <rect x="570" y="255" width="236" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="570" y="255" width="120" height="10" rx="4" fill="#a78bfa" opacity="0.85"/>
  <text x="464" y="290" font-size="10" fill="#334155" font-weight="500">Business Associates</text>
  <rect x="570" y="280" width="236" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="570" y="280" width="180" height="10" rx="4" fill="#f59e0b" opacity="0.85"/>
  <text x="464" y="315" font-size="10" fill="#334155" font-weight="500">Subcontractors</text>
  <rect x="570" y="305" width="236" height="10" rx="4" fill="#e2e8f0"/>
  <rect x="570" y="305" width="100" height="10" rx="4" fill="#06b6d4" opacity="0.85"/>

  <!-- Divider -->
  <rect x="44" y="336" width="808" height="1" fill="#e2e8f0"/>

  <!-- Markdown preview -->
  <text x="44" y="358" font-size="11" font-weight="700" fill="#4f8ef7">TLDR</text>
  <text x="44" y="378" font-size="12" fill="#475569">HIPAA applies to covered entities (health plans, providers, clearinghouses) and their business associates. PHI is any</text>
  <text x="44" y="396" font-size="12" fill="#475569">individually identifiable health information in any medium. The Privacy Rule controls use and disclosure.</text>
  <text x="44" y="420" font-size="11" font-weight="700" fill="#1e293b">Key Details</text>
  <text x="44" y="440" font-size="12" fill="#475569">· 18 HIPAA identifiers define PHI -- names, SSNs, dates, geographic data, and more</text>
  <text x="44" y="458" font-size="12" fill="#475569">· Minimum Necessary standard requires limiting disclosure to the least amount of PHI needed</text>
  <text x="44" y="476" font-size="12" fill="#475569">· HHS OCR enforces; State AGs can also bring actions under HITECH</text>
  <text x="44" y="494" font-size="12" fill="#475569">· HITECH (2009) extended obligations to business associates and increased penalties significantly</text>
  <text x="44" y="512" font-size="12" fill="#475569">· Breach notification required within 60 days to affected individuals; 60 days to HHS for large breaches</text>
</svg>
